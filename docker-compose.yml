name: courseflix

services:
  postgres:
    image: postgres:16-alpine
    container_name: courseflix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-courseflix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-courseflix_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-courseflix_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - courseflix_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-courseflix} -d ${POSTGRES_DB:-courseflix_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  courseflix_postgres_data:
